<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bapora Library - Live Status</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .header { background: #003366; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { margin: 0; font-size: 22px; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(50px, 1fr)); gap: 12px; max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        .seat { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; color: white; font-size: 16px; transition: 0.3s; }
        .available { background-color: #28a745; border: 2px solid #1e7e34; } /* Green */
        .occupied { background-color: #dc3545; border: 2px solid #bd2130; } /* Red */
        .legend { margin: 20px auto; display: flex; justify-content: center; gap: 25px; background: white; padding: 10px; width: fit-content; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; }
        .box { width: 18px; height: 18px; border-radius: 4px; }
        .footer { margin-top: 30px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="header">
        <h2>BAPORA LIBRARY</h2>
        <p style="margin: 5px 0 0 0; font-size: 14px; opacity: 0.9;">Live Seat Availability</p>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="box available"></div> Khali (Free)</div>
        <div class="legend-item"><div class="box occupied"></div> Full (Reserved)</div>
    </div>

    <div class="grid" id="seatGrid">
        </div>

    <div class="footer">
        <p>© Bapora Library & Study Center | Bhiwani</p>
    </div>

    <script>
        const totalSeats = 57;
        const seatGrid = document.getElementById('seatGrid');
        
        // Admin panel se sync kiya gaya data uthayega
        const syncData = JSON.parse(localStorage.getItem('bapora_seats')) || {};

        for (let i = 1; i <= totalSeats; i++) {
            const seat = document.createElement('div');
            seat.classList.add('seat');
            
            // Agar seat occupied hai toh Red dikhayega, warna Green
            if (syncData[i] === 'red') {
                seat.classList.add('occupied');
            } else {
                seat.classList.add('available');
            }
            
            seat.innerText = i;
            seatGrid.appendChild(seat);
        }
    </script>
</body>
</html>
