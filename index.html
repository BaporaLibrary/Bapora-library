<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bapora Library Status</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; margin: 0; padding: 10px; }
        .header { background: #003366; color: white; padding: 15px; border-radius: 0 0 20px 20px; }
        .dash { display: flex; justify-content: space-around; background: white; padding: 15px; margin: 15px 10px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .dash div { font-weight: bold; font-size: 16px; flex: 1; }
        .lbl { font-size: 9px; color: #666; display: block; text-transform: uppercase; margin-top: 5px; }
        .c-total { color: #555; } 
        .c-general { color: #007bff; } 
        .c-reserved { color: #dc3545; } 
        .c-available { color: #28a745; } 
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(45px, 1fr)); gap: 8px; max-width: 500px; margin: auto; padding: 15px; background: white; border-radius: 15px; }
        .seat { width: 45px; height: 45px; border-radius: 8px; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .st-available { background: #28a745; }
        .st-general { background: #007bff; }
        .st-reserved { background: #dc3545; }
        #admin { display: none; margin-top: 30px; border: 2px dashed #003366; padding: 20px; background: white; border-radius: 15px; }
        .adm-trigger { margin-top: 50px; color: #ccc; border: none; background: none; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h2>BAPORA LIBRARY</h2></div>
    <div class="dash">
        <div><span class="c-total">57</span><br><span class="lbl">Total</span></div>
        <div><span id="gen" class="c-general">0</span><br><span class="lbl">General</span></div>
        <div><span id="res" class="c-reserved">0</span><br><span class="lbl">Reserved</span></div>
        <div><span id="av" class="c-available">0</span><br><span class="lbl">Available</span></div>
    </div>
    <div class="grid" id="g"></div>
    <button class="adm-trigger" onclick="document.getElementById('admin').style.display='block'">[ Admin Login ]</button>
    <div id="admin">
        <input type="password" id="p" placeholder="Enter PIN" style="padding:10px; width:120px;">
        <button onclick="login()">Login</button>
        <div id="ctrl" style="display:none; margin-top:20px;">
            <p style="font-size:12px;">Click to change: <br><span style="color:blue">Blue (Gen)</span> -> <span style="color:red">Red (Res)</span> -> <span style="color:green">Green (Free)</span></p>
            <div id="ag"></div>
            <button onclick="save()" style="background:#28a745; color:white; padding:15px; margin-top:20px; width:100%; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">SAVE LIVE STATUS</button>
        </div>
    </div>

    <script>
        // Database Key
        const DB_KEY = 'bapora_v7_final_pin';
        let s = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        
        function draw() {
            const g = document.getElementById('g'); g.innerHTML = ""; 
            let r=0, gen=0;
            for(let i=1; i<=57; i++){
                const d = document.createElement('div');
                let cls = 'st-available';
                if(s[i] === 'blue') { cls = 'st-general'; gen++; }
                else if(s[i] === 'red') { cls = 'st-reserved'; r++; }
                d.className = `seat ${cls}`;
                d.innerText = i;
                g.appendChild(d);
            }
            document.getElementById('gen').innerText = gen;
            document.getElementById('res').innerText = r;
            document.getElementById('av').innerText = 57 - r - gen;
        }

        function login() {
            // Naya PIN: 681565
            if(document.getElementById('p').value === "681565") {
                document.getElementById('ctrl').style.display = 'block';
                drawAdmin();
            } else { alert("Wrong PIN!"); }
        }

        function drawAdmin() {
            const ag = document.getElementById('ag'); ag.innerHTML = "";
            for(let i=1; i<=57; i++){
                const b = document.createElement('button');
                b.innerText = i; b.style.margin="2px"; b.style.width="40px"; b.style.color="white"; b.style.padding="8px"; b.style.borderRadius="5px"; b.style.border="none";
                let bg = '#28a745';
                if(s[i] === 'blue') bg = '#007bff';
                else if(s[i] === 'red') bg = '#dc3545';
                b.style.background = bg;
                
                b.onclick = () => { 
                    if(!s[i]) s[i] = 'blue'; 
                    else if(s[i] === 'blue') s[i] = 'red'; 
                    else delete s[i]; 
                    drawAdmin(); 
                };
                ag.appendChild(b);
            }
        }

        function save() {
            localStorage.setItem(DB_KEY, JSON.stringify(s));
            alert("Mission Accomplished! Data Updated.");
            location.reload();
        }
        draw();
    </script>
</body>
</html>
