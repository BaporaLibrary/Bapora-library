<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bapora Library - Status</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
        .header { background: #003366; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(45px, 1fr)); gap: 10px; max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .seat { width: 45px; height: 45px; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .available { background: #28a745; } .occupied { background: #dc3545; }
        #adminPanel { display: none; margin-top: 30px; background: white; padding: 20px; border-radius: 10px; border: 2px solid #003366; }
        .admin-btn { position: fixed; bottom: 10px; right: 10px; padding: 8px; font-size: 10px; opacity: 0.3; background: #ccc; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2>BAPORA LIBRARY</h2>
        <p>Live Seat Status</p>
    </div>

    <div class="grid" id="seatGrid"></div>

    <button class="admin-btn" onclick="openAdmin()">Admin Login</button>

    <div id="adminPanel">
        <h3>Admin Control</h3>
        <input type="password" id="pin" placeholder="Enter PIN" style="padding:10px; width:70%;">
        <button onclick="login()" style="padding:10px; background:green; color:white; border:none; margin-top:10px;">Login</button>
        <div id="controls" style="display:none; margin-top:20px;">
            <p>Click on seat numbers below to change status:</p>
            <div id="adminGrid"></div>
            <button onclick="saveChanges()" style="background:red; color:white; padding:15px; margin-top:20px; width:100%;">SAVE & UPDATE LIVE</button>
        </div>
    </div>

    <script>
        const total = 57;
        let data = JSON.parse(localStorage.getItem('bapora_live')) || {};

        function draw() {
            const grid = document.getElementById('seatGrid');
            grid.innerHTML = "";
            for(let i=1; i<=total; i++) {
                const s = document.createElement('div');
                s.className = `seat ${data[i] === 'red' ? 'occupied' : 'available'}`;
                s.innerText = i;
                grid.appendChild(s);
            }
        }

        function openAdmin() { document.getElementById('adminPanel').style.display = 'block'; window.scrollTo(0, document.body.scrollHeight); }

        function login() {
            if(document.getElementById('pin').value === "939291") {
                document.getElementById('controls').style.display = 'block';
                drawAdmin();
            } else { alert("Wrong PIN"); }
        }

        function drawAdmin() {
            const ag = document.getElementById('adminGrid');
            ag.innerHTML = "";
            for(let i=1; i<=total; i++) {
                const b = document.createElement('button');
                b.innerText = i;
                b.style.margin = "2px";
                b.style.background = data[i] === 'red' ? 'red' : 'green';
                b.style.color = "white";
                b.onclick = () => { data[i] = data[i] === 'red' ? 'green' : 'red'; drawAdmin(); };
                ag.appendChild(b);
            }
        }

        function saveChanges() {
            localStorage.setItem('bapora_live', JSON.stringify(data));
            alert("Updated Successfully!");
            location.reload();
        }

        draw();
    </script>
</body>
</html>
