<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bapora Library - Premium Secure Center</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <style>
        :root { 
            --navy: #001a33; 
            --gold: #c5a059; 
            --green: #2ecc71; 
            --blue: #3498db; 
            --red: #e74c3c; 
            --glass: rgba(255, 255, 255, 0.15);
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #001f3f 0%, #003366 50%, #001f3f 100%); 
            background-attachment: fixed;
            margin: 0; 
            padding-bottom: 60px; 
            text-align: center; 
            color: #fff;
            min-height: 100vh;
        }
        
        /* PREMIUM HEADER */
        .header {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            border-bottom: 4px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 0 0 30px 30px;
            margin-bottom: 30px;
        }
        .header h2 {
            margin: 0;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff, #c0c0c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .tagline {
            font-size: 14px;
            color: var(--gold);
            font-weight: bold;
            margin-top: 15px;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.5); 
            display: inline-block;
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid var(--gold);
        }
        
        /* DASHBOARD GRID */
        .dash { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin: 20px; }
        .stat-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 10px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer;
        }
        .stat-card:hover { transform: translateY(-8px); background: rgba(255, 255, 255, 0.2); }
        .stat-card.total { border-left: 6px solid #fff; }
        .stat-card.general { border-left: 6px solid var(--blue); }
        .stat-card.reserved { border-left: 6px solid var(--red); }
        .stat-card.vacant { border-left: 6px solid var(--green); }
        
        .num { font-size: 32px; font-weight: 900; display: block; margin: 5px 0; }
        .lbl { font-size: 12px; font-weight: 700; color: #ddd; text-transform: uppercase; }

        /* PULSING STATUS BOX */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(46, 204, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }
        #live-status-box {
            margin: 30px 20px; padding: 18px; border-radius: 50px; font-weight: 800; font-size: 18px; 
            background: rgba(0, 0, 0, 0.3); border: 2px solid rgba(255,255,255,0.1);
        }
        .active-pulse { animation: pulse 2s infinite; }

        /* SEAT GRID */
        .section-box { 
            background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(5px);
            margin: 20px; padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05);
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 15px; }
        
        .seat { 
            width: 55px; height: 60px; border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 14px; font-weight: bold; 
            transition: 0.3s; cursor: pointer; position: relative;
        }
        .seat:hover { transform: scale(1.2) rotate(3deg); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .st-vacant { background: rgba(255,255,255,0.05); color: var(--green); border: 2px dashed var(--green); }
        .st-general { background: linear-gradient(145deg, var(--blue), #2980b9); color: white; border: none; box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4); }
        .st-reserved { background: linear-gradient(145deg, var(--red), #c0392b); color: white; border: none; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4); }

        /* ADMIN & BUTTONS */
        .admin-trigger { background: none; border: none; color: rgba(255,255,255,0.05); padding: 20px; width: 100%; cursor: pointer; }
        #admin-panel { display: none; margin: 20px; padding: 25px; background: #fff; color: #333; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { padding: 12px; margin: 10px; width: 85%; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .btn { padding: 15px 30px; background: var(--navy); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }

        /* WHATSAPP */
        .whatsapp-float { position: fixed; bottom: 25px; right: 25px; background-color: #25d366; color: #FFF; border-radius: 50px; width: 65px; height: 65px; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.5); transition: 0.3s; }
        .whatsapp-float:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="header">
        <h2>Bapora Library</h2>
        <div class="tagline">⚓ VETERAN SECURE SYSTEM ⚓</div>
    </div>

    <div class="dash">
        <div class="stat-card total" onclick="alert('Total capacity of Bapora Library: 57 Seats')">
            <span id="total-count" class="num">57</span>
            <span class="lbl">Capacity</span>
        </div>
        <div class="stat-card general" onclick="alert('Current students using general seating.')">
            <span id="gen-count" class="num" style="color:var(--blue)">0</span>
            <span class="lbl">General</span>
        </div>
        <div class="stat-card reserved" onclick="alert('These seats are currently booked/reserved.')">
            <span id="res-count" class="num" style="color:var(--red)">0</span>
            <span class="lbl">Reserved</span>
        </div>
        <div class="stat-card vacant" onclick="alert('Congratulations! These seats are available. Click WhatsApp to book!')">
            <span id="vac-count" class="num" style="color:var(--green)">0</span>
            <span class="lbl">Available</span>
        </div>
    </div>

    <div id="live-status-box" class="active-pulse">
        <span id="seat-status">SCANNING RADAR...</span>
    </div>

    <div class="section-box">
        <div class="grid" id="seat-grid"></div>
        <div style="margin-top: 20px; font-size: 11px; opacity: 0.6;">
            Legend: 🟢 Vacant | 🔵 General | 🔴 Reserved
        </div>
    </div>

    <button class="admin-trigger" onclick="showAdmin()">Admin Access</button>

    <div id="admin-panel">
        <h3 style="margin-top:0;">MASTER CONTROL 🔐</h3>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleLogin()">UNLOCK CONSOLE ⚓</button>
        
        <div id="admin-controls" style="display:none; margin-top:25px; border-top: 1px solid #eee; padding-top:20px;">
            <div id="admin-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap:8px; margin-bottom:20px;"></div>
            <button class="btn" style="background:var(--green);" onclick="updateCloud()">SYNC TO CLOUD ✅</button>
            <button class="btn" style="background:#666;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>

    <a href="https://wa.me/919393681565?text=Hello%20Sir!%20I%20want%20to%20book%20a%20seat%20in%20Bapora%20Library." class="whatsapp-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35" alt="WhatsApp">
    </a>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAsF3o3S7fpvTumwVVL_exuqMlAUS5MKXE", 
            authDomain: "baporalibrary-fea16.firebaseapp.com",
            databaseURL: "https://baporalibrary-fea16-default-rtdb.firebaseio.com/",
            projectId: "baporalibrary-fea16"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let seatData = {};

        db.ref('seats').on('value', (snap) => {
            seatData = snap.val() || {};
            render();
        });

        function render() {
            const grid = document.getElementById('seat-grid'); 
            grid.innerHTML = "";
            let g=0, r=0;
            const total = 57;

            for(let i=1; i<=total; i++){
                let div = document.createElement('div');
                let status = seatData[i] || 'v';
                div.className = status==='g'?'seat st-general':status==='r'?'seat st-reserved':'seat st-vacant';
                
                if(status === 'g' || status === 'r') {
                    div.innerHTML = `<span style="font-size:16px;">👤</span><span style="font-size:10px;">${i}</span>`;
                } else {
                    div.innerHTML = `<span>${i}</span>`;
                }

                if(status==='g') g++; if(status==='r') r++;
                grid.appendChild(div);
            }
            
            document.getElementById('gen-count').innerText = g;
            document.getElementById('res-count').innerText = r;
            document.getElementById('vac-count').innerText = total - (g+r);

            updateLiveStatus(total - (g+r));
        }

        function updateLiveStatus(available) {
            const statusText = document.getElementById("seat-status");
            const statusBox = document.getElementById("live-status-box");

            if (available > 10) {
                statusText.innerText = "🟢 STATUS: SEATS AVAILABLE";
                statusText.style.color = "#2ecc71"; 
                statusBox.className = "active-pulse";
            } else if (available > 0) {
                statusText.innerText = "🟡 STATUS: FILLING FAST (" + available + " LEFT)";
                statusText.style.color = "#f1c40f"; 
                statusBox.className = "active-pulse";
            } else {
                statusText.innerText = "🔴 STATUS: LIBRARY FULL";
                statusText.style.color = "#e74c3c";
                statusBox.className = "";
            }
        }

        function showAdmin() { 
            document.getElementById('admin-panel').style.display='block'; 
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    alert("System Unlocked, Petty Officer!");
                    document.getElementById('admin-controls').style.display='block';
                    renderAdmin();
                })
                .catch(e => alert("ACCESS DENIED!"));
        }

        function renderAdmin() {
            const ag = document.getElementById('admin-grid'); ag.innerHTML = "";
            for(let i=1; i<=57; i++){
                const b = document.createElement('button');
                b.innerText = i; b.style.padding="10px 5px"; b.style.border="1px solid #ccc"; b.style.borderRadius="8px";
                let status = seatData[i] || 'v';
                b.style.background = (status==='g')?'#3498db':(status==='r')?'#e74c3c':'#eee';
                b.style.color = (status==='v')?'#333':'white';
                b.onclick = () => {
                    if(!seatData[i] || seatData[i]==='v') seatData[i]='g';
                    else if(seatData[i]==='g') seatData[i]='r';
                    else delete seatData[i];
                    renderAdmin();
                };
                ag.appendChild(b);
            }
        }

        function updateCloud() {
            db.ref('seats').set(seatData).then(() => {
                alert("Database Updated! ✅");
            }).catch(e => alert("Permission Denied!"));
        }
        
        // Security Controls
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; 
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
        };
    </script>
</body>
</html>
