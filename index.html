<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bapora Library - Live Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --navy: #002b5b; --gold: #c5a059; --green: #2ecc71; --blue: #3498db; --red: #e74c3c; --bg-light: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); --card-light: #ffffff; --text-light: #222; }
        
        /* NIGHT VISION VARIABLES */
        body.dark-mode { --bg-light: #121212; --card-light: #1e1e1e; --text-light: #e0e0e0; }
        body.dark-mode .header { background: radial-gradient(circle at center, #001a33 0%, #000000 100%); border-bottom: 5px solid #555; }
        body.dark-mode .stat-card { border-color: #333; box-shadow: 0 4px 10px rgba(255,255,255,0.05); background: #1e1e1e;}
        body.dark-mode .lbl { color: #aaa; }
        body.dark-mode #live-status-box { background: rgba(30, 30, 30, 0.9); }
        body.dark-mode .section-box { background: rgba(30, 30, 30, 0.8); border-color: #444; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); }
        body.dark-mode .st-vacant { background: #222; border-color: #2ecc71; }
        body.dark-mode .st-vacant:hover { background: #196f3d; }
        body.dark-mode .notice-board { background: rgba(30, 30, 30, 0.9); border-color: #444; }
        body.dark-mode .notice-board h3 { color: var(--gold); border-bottom-color: #444;}
        body.dark-mode .notice-board ul { color: #ccc; }
        body.dark-mode input { background: #333; color: white; border-color: #555; }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-light); 
            color: var(--text-light);
            margin: 0; 
            padding-bottom: 50px; 
            text-align: center; 
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        .header { background: radial-gradient(circle at center, #003366 0%, #001a33 100%); color: white; padding: 30px 20px; border-bottom: 5px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-radius: 0 0 15px 15px; margin-bottom: 20px; position: relative;}
        .header h2 { margin: 0; font-size: 32px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; text-shadow: 2px 2px 4px rgba(0,0,0,0.5), 0 0 10px rgba(255,255,255,0.1); }
        .tagline { font-size: 12px; color: var(--gold); font-weight: bold; margin-top: 10px; letter-spacing: 1.5px; text-transform: uppercase; background-color: rgba(0,0,0,0.4); display: inline-block; padding: 5px 15px; border-radius: 20px; border: 1px solid rgba(197, 160, 89, 0.3); box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        
        #dark-mode-btn { position: absolute; top: 15px; right: 20px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; z-index: 10; backdrop-filter: blur(5px);}
        #dark-mode-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.4); }

        .dash { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 15px 20px; }
        .stat-card { background: var(--card-light); padding: 15px 10px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); border: 1px solid #e0e0e0; display: flex; flex-direction: column; align-items: center; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .stat-card.total { border-bottom: 4px solid #555; }
        .stat-card.general { border-bottom: 4px solid var(--blue); }
        .stat-card.reserved { border-bottom: 4px solid var(--red); }
        .stat-card.vacant { border-bottom: 4px solid var(--green); }
        .stat-icon { font-size: 24px; margin-bottom: 5px; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.2)); }
        .num { font-size: 26px; font-weight: 900; margin-bottom: 2px; }
        .lbl { font-size: 11px; color: #555; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;}
