<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bapora Library - Secure Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <style>
        :root { --navy: #002b5b; --gold: #c5a059; --green: #2ecc71; --blue: #3498db; --red: #e74c3c; }
        body { font-family: sans-serif; background: #f4f7f9; margin: 0; padding-bottom: 50px; text-align: center; }
        
        /* 3D PREMIUM HEADER */
        .header { 
            background: linear-gradient(135deg, #001f3f, #004080); 
            color: white; 
            padding: 25px 20px; 
            border-bottom: 5px solid var(--gold); 
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3); 
            margin-bottom: 15px;
        }
        .header h2 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6); 
        }
        .tagline { 
            font-size: 11px; 
            color: var(--gold); 
            font-weight: bold; 
            margin-top: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.25); 
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px; 
            border: 1px solid rgba(197, 160, 89, 0.4);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        
        /* MODERN DASHBOARD CARDS */
        .dash { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 15px; }
        .stat-card { background: white; padding: 15px 10px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; border-bottom: 4px solid #ccc; transition: transform 0.2s; }
        .stat-card:active { transform: scale(0.98); }
        .stat-card.total { border-color: #555; }
        .stat-card.general { border-color: var(--blue); }
        .stat-card.reserved { border-color: var(--red); }
        .stat-card.vacant { border-color: var(--green); }
        .stat-icon { font-size: 22px; margin-bottom: 5px; }
        .num { font-size: 24px; font-weight: 900; margin-bottom: 2px; }
        .lbl { font-size: 10px; color: #7f8c8d; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px;}

        /* UPDATED: 3D SEAT GRID WITH ICONS */
        .section-box { background: white; margin: 15px; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; }
        
        .seat { 
            width: 50px; 
            height: 55px; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            font-size: 13px; 
            font-weight: bold; 
            transition: 0.2s;
        }
        
        /* Vacant: Clean and simple */
        .st-vacant { 
            background: #fff; 
            color: var(--green); 
            border: 2px dashed var(--green); 
        }
        
        /* Occupied: 3D Gradients and Shadows */
        .st-general { 
            background: linear-gradient(145deg, #3498db, #2980b9); 
            color: white; 
            border: none; 
            box-shadow: 2px 4px 8px rgba(0,0,0,0.2), inset 1px 1px 2px rgba(255,255,255,0.4);
        }
        .st-reserved { 
            background: linear-gradient(145deg, #e74c3c, #c0392b); 
            color: white; 
            border: none; 
            box-shadow: 2px 4px 8px rgba(0,0,0,0.2), inset 1px 1px 2px rgba(255,255,255,0.4);
        }

        .icon-stu { font-size: 18px; margin-bottom: 2px; line-height: 1; }
        .seat-no { font-size: 12px; line-height: 1; }

        /* Admin Section */
        .admin-trigger { background: none; border: none; color: rgba(0,0,0,0.01); padding: 20px; width: 100%; cursor: pointer; }
        #admin-panel { display: none; margin: 20px; padding: 20px; background: #fff; border: 3px solid var(--navy); border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        input { padding: 12px; margin: 8px; width: 85%; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; outline: none; }
        .btn { padding: 12px 25px; background: var(--navy); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }

        /* WhatsApp */
        .whatsapp-float { position: fixed; width: 60px; height: 60px; bottom: 20px; right: 20px; background-color: #25d366; color: #FFF; border-radius: 50px; box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3); z-index: 1000; display: flex; justify-content: center; align-items: center; text-decoration: none; transition: transform 0.3s ease; }
        .whatsapp-float:hover { transform: scale(1.1); }
        .whatsapp-icon { width: 35px; height: 35px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>BAPORA LIBRARY</h2>
        <div class="tagline">⚓ VETERAN SECURE SYSTEM ⚓</div>
    </div>

    <div class="dash">
        <div class="stat-card total">
            <div class="stat-icon">🏛️</div>
            <span id="total-count" class="num" style="color:#555">57</span>
            <span class="lbl">Total Seats</span>
        </div>
        <div class="stat-card general">
            <div class="stat-icon">📘</div>
            <span id="gen-count" class="num" style="color:var(--blue)">0</span>
            <span class="lbl">General</span>
        </div>
        <div class="stat-card reserved">
            <div class="stat-icon">📕</div>
            <span id="res-count" class="num" style="color:var(--red)">0</span>
            <span class="lbl">Reserved</span>
        </div>
        <div class="stat-card vacant">
            <div class="stat-icon">✅</div>
            <span id="vac-count" class="num" style="color:var(--green)">0</span>
            <span class="lbl">Vacant</span>
        </div>
    </div>

    <div id="live-status-box" style="text-align:center; margin: 15px; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; transition: 0.3s;">
        <span id="seat-status">Checking Status...</span>
    </div>

    <div class="section-box">
        <div class="grid" id="seat-grid"></div>
    </div>

    <button class="admin-trigger" onclick="showAdmin()">Admin</button>

    <div id="admin-panel">
        <h3 style="color:var(--navy); margin-top:0;">MASTER CONTROL 🔐</h3>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleLogin()">LOGIN ⚓</button>
        
        <div id="admin-controls" style="display:none; margin-top:20px; border-top: 2px solid #eee; padding-top:20px;">
            <div id="admin-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap:5px; margin-bottom:15px;"></div>
            <button class="btn" style="width:100%; background:var(--green);" onclick="updateCloud()">SYNC TO DATABASE</button>
            <button class="btn" style="width:100%; background:var(--red); margin-top:10px;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>

    <a href="https://wa.me/919393681565?text=Hello%20Sir!%20I%20have%20a%20query%20regarding%20the%20Bapora%20Library." class="whatsapp-float" target="_blank" rel="noopener noreferrer">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="Chat on WhatsApp" class="whatsapp-icon">
    </a>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAsF3o3S7fpvTumwVVL_exuqMlAUS5MKXE", 
            authDomain: "baporalibrary-fea16.firebaseapp.com",
            databaseURL: "https://baporalibrary-fea16-default-rtdb.firebaseio.com/",
            projectId: "baporalibrary-fea16"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let seatData = {};

        db.ref('seats').on('value', (snap) => {
            seatData = snap.val() || {};
            render();
        });

        function render() {
            const grid = document.getElementById('seat-grid'); 
            grid.innerHTML = "";
            let g=0, r=0;
            const total = 57;

            for(let i=1; i<=total; i++){
                let div = document.createElement('div');
                let status = seatData[i] || 'v';
                div.className = status==='g'?'seat st-general':status==='r'?'seat st-reserved':'seat st-vacant';
                
                // NAYA LOGIC: Agar occupied hai toh icon dikhao
                if(status === 'g' || status === 'r') {
                    div.innerHTML = `<div class="icon-stu">👤</div><div class="seat-no">${i}</div>`;
                } else {
                    // Khali seat par sirf number dikhega
                    div.innerHTML = `<div class="seat-no" style="font-size:16px;">${i}</div>`;
                }

                if(status==='g') g++; if(status==='r') r++;
                grid.appendChild(div);
            }
            
            document.getElementById('total-count').innerText = total;
            document.getElementById('gen-count').innerText = g;
            document.getElementById('res-count').innerText = r;
            document.getElementById('vac-count').innerText = total - (g+r);

            updateLiveStatus(g + r);
        }

        function updateLiveStatus(totalOccupied) {
            const totalSeats = 57;
            const available = totalSeats - totalOccupied;
            const statusText = document.getElementById("seat-status");
            const statusBox = document.getElementById("live-status-box");

            if (available > 10) {
                statusText.innerText = "🟢 STATUS: SEATS AVAILABLE";
                statusText.style.color = "#196f3d"; 
                statusBox.style.border = "2px solid #2ecc71";
                statusBox.style.backgroundColor = "#eaeded"; 
            } else if (available > 0) {
                statusText.innerText = "🟡 STATUS: FILLING FAST (Only " + available + " Left)";
                statusText.style.color = "#d68910"; 
                statusBox.style.border = "2px solid orange";
                statusBox.style.backgroundColor = "#fef9e7"; 
            } else {
                statusText.innerText = "🔴 STATUS: FULLY OCCUPIED";
                statusText.style.color = "#c0392b"; 
                statusBox.style.border = "2px solid red";
                statusBox.style.backgroundColor = "#fdedec"; 
            }
        }

        function showAdmin() { 
            document.getElementById('admin-panel').style.display='block'; 
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    alert("Welcome Petty Officer! System Unlocked.");
                    document.getElementById('admin-controls').style.display='block';
                    renderAdmin();
                })
                .catch(e => alert("ACCESS DENIED: Wrong Email or Password."));
        }

        function renderAdmin() {
            const ag = document.getElementById('admin-grid'); ag.innerHTML = "";
            for(let i=1; i<=57; i++){
                const b = document.createElement('button');
                b.innerText = i; b.style.padding="8px"; b.style.border="none"; b.style.color="white"; b.style.borderRadius="4px";
                let status = seatData[i] || 'v';
                b.style.background = (status==='g')?'#3498db':(status==='r')?'#e74c3c':'#2ecc71';
                b.onclick = () => {
                    if(!seatData[i] || seatData[i]==='v') seatData[i]='g';
                    else if(seatData[i]==='g') seatData[i]='r';
                    else delete seatData[i];
                    renderAdmin();
                };
                ag.appendChild(b);
            }
        }

        function updateCloud() {
            db.ref('seats').set(seatData).then(() => {
                alert("Database Synced! ✅");
            }).catch(e => alert("Permission Denied! Log in first."));
        }
        
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.onkeydown = function(e) {
            if(e.keyCode == 123) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; } 
        };
    </script>
</body>
</html>
