<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bapora Library - Live Status</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --navy: #002b5b; --gold: #c5a059; --green: #2ecc71; --blue: #3498db; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); margin: 0; padding-bottom: 80px; text-align: center; }
        .header { background: radial-gradient(circle at center, #003366 0%, #001a33 100%); color: white; padding: 30px 20px; border-bottom: 5px solid var(--gold); border-radius: 0 0 15px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .header h2 { margin: 0; font-size: 32px; font-weight: 800; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .tagline { font-size: 11px; color: var(--gold); font-weight: bold; margin-top: 10px; text-transform: uppercase; background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 20px; display: inline-block; border: 1px solid rgba(197, 160, 89, 0.3); }
        .dash { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px; }
        .stat-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); padding: 15px 10px; border-radius: 16px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); border-bottom: 4px solid #ccc; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 12px; margin: 20px; padding: 20px; background: rgba(255,255,255,0.4); border-radius: 15px; }
        .seat { width: 50px; height: 55px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; transition: 0.3s; }
        .st-vacant { background: #fff; color: var(--green); border: 2px dashed var(--green); }
        .st-general { background: linear-gradient(145deg, #3498db, #2980b9); color: white; box-shadow: 2px 4px 8px rgba(0,0,0,0.2); }
        .st-reserved { background: linear-gradient(145deg, #e74c3c, #c0392b); color: white; box-shadow: 2px 4px 8px rgba(0,0,0,0.2); }
        .icon-stu { font-size: 18px; margin-bottom: 2px; }
        .whatsapp-float { position: fixed; width: 60px; height: 60px; bottom: 20px; right: 20px; background-color: #25d366; border-radius: 50px; display: flex; justify-content: center; align-items: center; z-index: 9999 !important; box-shadow: 2px 6px 15px rgba(0,0,0,0.3); text-decoration: none; }
        .whatsapp-icon { width: 35px; height: 35px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>BAPORA LIBRARY</h2>
        <div class="tagline">⚓ VETERAN SECURE SYSTEM ⚓</div>
    </div>
    <div class="dash">
        <div class="stat-card" style="border-color: var(--navy);"><b>57</b><br><small>TOTAL</small></div>
        <div class="stat-card" style="border-color: var(--green);"><b id="vac-count">0</b><br><small>VACANT</small></div>
    </div>
    <div class="grid" id="seat-grid"></div>
    <a href="https://wa.me/919393681565?text=Hello%20Sir!" class="whatsapp-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="whatsapp-icon">
    </a>
    <script>
        const config = { databaseURL: "https://baporalibrary-fea16-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        db.ref('seats').on('value', (snap) => {
            const data = snap.val() || {};
            const grid = document.getElementById('seat-grid'); grid.innerHTML = "";
            let v = 0;
            for(let i=1; i<=57; i++){
                let div = document.createElement('div');
                let s = data[i] || 'v';
                div.className = s==='g'?'seat st-general':s==='r'?'seat st-reserved':'seat st-vacant';
                if(s==='v') { div.innerHTML = i; v++; }
                else { div.innerHTML = `<div class="icon-stu">👤</div><div>${i}</div>`; }
                grid.appendChild(div);
            }
            document.getElementById('vac-count').innerText = v;
        });
    </script>
</body>
</html>
