<div class="notice-board" id="waitlist-section" style="border-left-color: var(--gold); margin-top: 10px;">
    <h3 style="color: #856404;">📝 Join Waiting List (If Seats Full)</h3>
    <div id="waitlist-form">
        <input type="text" id="waitName" placeholder="Your Full Name" style="width: 90%; margin: 5px 0; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
        <input type="tel" id="waitPhone" placeholder="WhatsApp Number" style="width: 90%; margin: 5px 0; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
        <button class="btn" style="background: var(--navy); width: 95%; margin-top: 10px;" onclick="joinWaitlist()">SUBMIT REQUEST 🚀</button>
    </div>
    <p id="wait-msg" style="display:none; color: green; font-weight: bold; font-size: 13px; margin-top: 10px;">✅ Request Sent! Admin will contact you soon.</p>
</div>

<script>
    // WAITING LIST FUNCTION
    function joinWaitlist() {
        const name = document.getElementById('waitName').value;
        const phone = document.getElementById('waitPhone').value;
        
        if(!name || !phone) {
            alert("Commander, details are missing!");
            return;
        }

        const waitData = {
            name: name,
            phone: phone,
            time: new Date().toLocaleString(),
            status: "Pending"
        };

        // Yeh data Firebase ke ek naye folder 'waiting_list' mein jayega
        db.ref('waiting_list').push(waitData).then(() => {
            document.getElementById('waitlist-form').style.display = 'none';
            document.getElementById('wait-msg').style.display = 'block';
        });
    }
</script>
