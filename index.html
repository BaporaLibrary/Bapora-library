<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bapora Library - Admin Access</title>
    <style>
        body { font-family: sans-serif; background: #003366; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: white; color: #333; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; text-align: center; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .student-link { margin-top: 20px; display: block; color: #003366; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="margin-top:0;">Admin Login</h2>
    <p style="font-size:12px; color:#666;">Bapora Library Control Panel</p>
    <input type="password" id="pin" placeholder="Enter PIN">
    <button onclick="check()">Login Now</button>
    <hr>
    <a href="library.html" class="student-link">Go to Student View →</a>
</div>

<script>
    function check() {
        if(document.getElementById('pin').value === "939291") {
            // Sahi PIN par hum aapko control page par bhej denge
            window.location.href = "bapora-master-control.html";
        } else {
            alert("Wrong PIN!");
        }
    }
</script>

</body>
</html>
