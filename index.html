<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bapora Library | Live Dashboard</title>
    <style>
        :root { --navy: #003366; --gold: #d4af37; --green: #28a745; --blue: #007bff; --red: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding-bottom: 50px; }
        
        /* Premium Header */
        .header { background: var(--navy); color: white; padding: 25px 15px; border-bottom: 5px solid var(--gold); }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .tagline { font-size: 12px; color: var(--gold); font-weight: bold; text-transform: uppercase; margin-top: 5px; }

        /* Status Dashboard */
        .dash { display: flex; justify-content: space-around; background: white; padding: 20px; margin: -20px 15px 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .dash div { flex: 1; border-right: 1px solid #eee; }
        .dash div:last-child { border: none; }
        .num { font-size: 20px; font-weight: bold; display: block; }
        .lbl { font-size: 10px; color: #777; font-weight: bold; }

        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(45px, 1fr)); gap: 10px; max-width: 600px; margin: auto; padding: 20px; background: white; border-radius: 20px; }
        .seat { width: 45px; height: 45px; border-radius: 10px; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; transition: 0.3s; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        
        .st-available { background: var(--green); }
        .st-general { background: var(--blue); }
        .st-reserved { background: var(--red); }

        /* WhatsApp Floating Button */
        .wa-btn { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 100; }

        /* Admin Section */
        #admin { display: none; margin: 30px 15px; padding: 20px; background: #fff; border: 2px dashed var(--navy); border-radius: 15px; }
        .adm-btn { background: #ccc; border: none; font-size: 10px; padding: 5px 10px; cursor: pointer; border-radius: 5px; margin-top: 40px; }
        .save-btn { background: var(--navy); color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BAPORA LIBRARY</h1>
        <div class="tagline">⚓ Managed by Indian Navy Veteran ⚓</div>
    </div>

    <div class="dash">
        <div><span class="num" style="color:#555">57</span><span class="lbl">TOTAL</span></div>
        <div><span id="gen" class="num" style="color:var(--blue)">0</span><span class="lbl">GENERAL</span></div>
        <div><span id="res" class="num" style="color:var(--red)">0</span><span class="lbl">RESERVED</span></div>
        <div><span id="av" class="num" style="color:var(--green)">0</span><span class="lbl">EMPTY</span></div>
    </div>

    <div class="grid" id="g"></div>

    <a href="https://wa.me/91[YOUR_NUMBER_HERE]" class="wa-btn">
        💬 Message Us
    </a>

    <button class="adm-btn" onclick="document.getElementById('admin').style.display='block'">[ Staff Login ]</button>

    <div id="admin">
        <h3>Admin Console</h3>
        <input type="password" id="p" placeholder="Enter PIN" style="padding:12px; border-radius:8px; border:1px solid #ddd; width:150px;">
        <button onclick="login()" style="padding:12px 20px; border-radius:8px; background:var(--navy); color:white; border:none;">Login</button>
        
        <div id="ctrl" style="display:none; margin-top:20px;">
            <p style="font-size:12px; color:red; font-weight:bold;">Tap to Cycle: Blue → Red → Green</p>
            <div id="ag"></div>
            <button onclick="save()" class="save-btn">UPDATE LIVE STATUS</button>
        </div>
    </div>

    <script>
        const DB_KEY = 'bapora_v8_pro';
        let s = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        
        function draw() {
            const g = document.getElementById('g'); g.innerHTML = ""; 
            let r=0, gen=0;
            for(let i=1; i<=57; i++){
                const d = document.createElement('div');
                let cls = 'st-available';
                if(s[i] === 'blue') { cls = 'st-general'; gen++; }
                else if(s[i] === 'red') { cls = 'st-reserved'; r++; }
                d.className = `seat ${cls}`;
                d.innerText = i;
                g.appendChild(d);
            }
            document.getElementById('gen').innerText = gen;
            document.getElementById('res').innerText = r;
            document.getElementById('av').innerText = 57 - r - gen;
        }

        function login() {
            if(document.getElementById('p').value === "681565") {
                document.getElementById('ctrl').style.display = 'block';
                drawAdmin();
            } else { alert("Access Denied!"); }
        }

        function drawAdmin() {
            const ag = document.getElementById('ag'); ag.innerHTML = "";
            for(let i=1; i<=57; i++){
                const b = document.createElement('button');
                b.innerText = i; b.style.margin="3px"; b.style.width="42px"; b.style.height="42px"; b.style.color="white"; b.style.borderRadius="8px"; b.style.border="none";
                let bg = '#28a745';
                if(s[i] === 'blue') bg = '#007bff';
                else if(s[i] === 'red') bg = '#dc3545';
                b.style.background = bg;
                
                b.onclick = () => { 
                    if(!s[i]) s[i] = 'blue'; 
                    else if(s[i] === 'blue') s[i] = 'red'; 
                    else delete s[i]; 
                    drawAdmin(); 
                };
                ag.appendChild(b);
            }
        }

        function save() {
            localStorage.setItem(DB_KEY, JSON.stringify(s));
            alert("System Synchronized! Dashboard Updated.");
            location.reload();
        }
        draw();
    </script>
</body>
</html>
