<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bapora Library Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { color: #003366; text-align: center; border-bottom: 2px solid #003366; padding-bottom: 10px; }
        #login-section { text-align: center; margin-top: 50px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 95%; padding: 12px; background: #003366; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .seat-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .red { background: #ffebee; color: #c62828; }
        .green { background: #e8f5e9; color: #2e7d32; }
        #admin-panel { display: none; }
    </style>
</head>
<body>

<div id="login-section" class="container">
    <h2>Admin Access</h2>
    <input type="password" id="pin" placeholder="Enter 6-Digit Secret PIN">
    <button onclick="verify()">Login to Control Panel</button>
</div>

<div id="admin-panel" class="container">
    <h2>Bapora Library Control</h2>
    <p style="text-align:center; font-size: 14px; color: #666;">Manage 57 Seats Safely</p>
    
    <div id="seatList"></div>
    
    <button onclick="syncNow()" style="background: #28a745; margin-top: 20px;">SAVE & SYNC LIVE STATUS</button>
    <button onclick="location.reload()" style="background: #6c757d;">LOGOUT</button>
</div>

<script>
    const MY_PIN = "939291"; 
    let seatData = JSON.parse(localStorage.getItem('bapora_seats')) || {};

    function verify() {
        if(document.getElementById('pin').value === MY_PIN) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            renderSeats();
        } else {
            alert("Galat PIN! Access Denied.");
        }
    }

    function renderSeats() {
        const list = document.getElementById('seatList');
        list.innerHTML = "";
        for(let i=1; i<=57; i++) {
            const isOcc = seatData[i] === 'red';
            const row = document.createElement('div');
            row.className = 'seat-item';
            row.innerHTML = `
                <span>Seat ${i}</span>
                <span class="status-tag ${isOcc ? 'red' : 'green'}">${isOcc ? 'RESERVED' : 'FREE'}</span>
                <button onclick="toggle(${i})" style="width:auto; padding:5px 10px; font-size:12px;">Change</button>
            `;
            list.appendChild(row);
        }
    }

    function toggle(id) {
        seatData[id] = (seatData[id] === 'red') ? 'green' : 'red';
        renderSeats();
    }

    function syncNow() {
        localStorage.setItem('bapora_seats', JSON.stringify(seatData));
        alert("Status updated! Students will now see the new layout.");
    }
</script>

</body>
</html>
