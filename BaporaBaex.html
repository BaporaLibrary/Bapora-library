        #adminMainContent { display: none; }
        :root { --navy: #002347; --gold: #c5a059; --bg: #f4f4f9; --card: #ffffff; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 8px; }
        .container { max-width: 480px; margin: auto; background: var(--card); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--navy); overflow: hidden; }
        
        /* Buttons & Tabs */
        .btn-row { display: flex; gap: 5px; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; }
        .btn-sm { flex: 1; padding: 10px; border: none; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; color: white; }
        .tabs { display: flex; background: #eceff1; }
        .tab-btn { flex: 1; padding: 14px 5px; border: none; background: none; font-weight: bold; cursor: pointer; color: #546e7a; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--navy); border-bottom: 3px solid var(--navy); background: #fff; }
        
        /* Stats & Items */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .stat { background: #fff; border: 1px solid var(--navy); padding: 10px; border-radius: 8px; text-align: center; }
        .record-item { background: white; padding: 12px; border-radius: 8px; margin: 8px 10px; border: 1px solid #eee; border-left: 5px solid var(--navy); }
        .due { border-left-color: var(--danger); background: #fff5f5; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #fileInput { display: none; }
    </style>
</head>

    function checkAccess() {
        let pin = prompt("Bapora Admin PIN:");
        if (pin === "939291") {
            // Memory fix: if empty, load masterData 
            if (!localStorage.getItem('bapora_v11')) {
                localStorage.setItem('bapora_v11', JSON.stringify(masterData));
            }
            document.getElementById('adminMainContent').style.display = "block";
            render();
        } else {
            alert("Wrong PIN");
            window.location.href = "library.html";
        }
    }
    window.onload = checkAccess;

    function render() {
        let data = JSON.parse(localStorage.getItem('bapora_v11'));
        let sH = "", tF = 0, eH = "", tE = 0;
        const today = new Date().toISOString().split('T')[0];

        data.students.forEach(s => {
            tF += parseFloat(s.amount) || 0;
            let isDue = s.fee < today;
            sH += `<div class="record-item ${isDue ? 'due' : ''}">
                <div style="display:flex; justify-content:space-between;">
                    <b>${s.name} ${s.seat ? '(S-'+s.seat+')' : ''}</b>
                    <span style="color:${isDue ? 'red' : 'green'};">₹${s.amount || 0}</span>
                </div>
                <small>Expiry: ${s.fee}</small>
            </div>`;
        });

        data.expenses.forEach(e => {
            tE += parseFloat(e.amt) || 0;
            eH += `<div class="record-item"><b>${e.note}</b><br><small>${e.date}: ₹${e.amt}</small></div>`;
        });

        document.getElementById('countTotal').innerText = data.students.length;
        document.getElementById('sumFees').innerText = '₹' + tF;
        document.getElementById('totalExp').innerText = '₹' + tE;
        document.getElementById('stuList').innerHTML = sH;
        document.getElementById('expList').innerHTML = eH;
    }

    // 💾 Backup: Download current data to phone
    function downloadBackup() {
        const data = localStorage.getItem('bapora_v11');
        const blob = new Blob([data], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `bapora_backup_${new Date().toLocaleDateString()}.txt`;
        a.click();
    }

    // 📂 Restore: Upload file to restore data
    function triggerRestore() { document.getElementById('fileInput').click(); }
    
    function restoreData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const json = JSON.parse(e.target.result);
                if (json.students) {
                    localStorage.setItem('bapora_v11', e.target.result);
                    alert("Data Restored Successfully!");
                    render();
                }
            } catch (err) { alert("Invalid Backup File!"); }
        };
        reader.readAsText(file);
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        event.target.classList.add('active');
    }
</script>

<div id="adminMainContent">
    <div class="container">

            <button onclick="triggerRestore()" class="btn-sm" style="background:#27ae60;">📂 RESTORE</button>
            <input type="file" id="fileInput" onchange="restoreData(event)">
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('lib-tab')">STUDENTS</button>
