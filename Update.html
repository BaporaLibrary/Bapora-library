<!DOCTYPE html>
<html>
<head>
    <title>Bapora Admin v10.7</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #adminMainContent { display: none; }
        :root { --navy: #002347; --gold: #c5a059; --bg: #f4f4f9; --card: #ffffff; --text: #222; --safe: #1b5e20; --danger: #b71c1c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); padding: 8px; margin: 0; }
        .container { max-width: 480px; margin: auto; background: var(--card); border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid var(--navy); overflow: hidden; }
        .btn-public-view { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; text-decoration: none; display: block; text-align: center; border-bottom: 2px solid var(--navy); }
        .tabs { display: flex; background: #eceff1; }
        .tab-btn { flex: 1; padding: 14px 5px; border: none; background: none; font-weight: bold; cursor: pointer; color: #546e7a; font-size: 12px; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--navy); border-bottom: 3px solid var(--navy); background: #fff; }
        .tab-content { display: none; padding: 12px; }
        .tab-content.active { display: block; }
        .section { background: #fafafa; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #e0e0e0; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #cfd8dc; border-radius: 4px; box-sizing: border-box; }
        .record-item { background: white; padding: 12px; border-radius: 6px; margin-top: 8px; border: 1px solid #eceff1; border-left: 4px solid var(--navy); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .stat { background: #fff; border: 1px solid var(--navy); padding: 8px; border-radius: 6px; text-align: center; color: var(--navy); }
        .btn-main { padding: 12px; width: 100%; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
    </style>
</head>
<body>

<script>
    function checkAccess() {
        let pin = prompt("Bapora Admin PIN दर्ज करें:");
        if (pin === "939291") {
            document.getElementById('adminMainContent').style.display = "block";
            loadData();
        } else {
            alert("गलत पासवर्ड!");
            window.location.href = "library.html";
        }
    }
    window.onload = checkAccess;
</script>

<div id="adminMainContent">
    <div class="container">
        <a href="library.html" class="btn-public-view">🌐 OPEN STUDENT PUBLIC VIEW</a>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('lib-tab')">LIBRARIAN</button>
            <button class="tab-btn" onclick="switchTab('exp-tab')">FINANCE</button>
        </div>
        <div id="lib-tab" class="tab-content active">
            <div class="stat-grid">
                <div class="stat"><small>Students</small><b id="countTotal">0</b></div>
                <div class="stat"><small>Fees</small><b id="sumFees">₹0</b></div>
            </div>
            <div class="section">
                <input type="text" id="stuName" placeholder="Student Name">
                <input type="text" id="stuSeat" placeholder="Seat No">
                <input type="number" id="stuAmt" placeholder="Fee Paid (₹)">
                <input type="tel" id="stuPhone" placeholder="WhatsApp Number">
                <input type="date" id="stuFeeDate">
                <button class="btn-main" style="background:var(--navy);" onclick="saveStudent()">SAVE RECORD</button>
            </div>
            <div id="stuList"></div>
            <div class="section" style="text-align:center;">
                <button class="btn-main" style="background:var(--gold); color:#000;" onclick="exportData()">💾 DOWNLOAD BACKUP</button>
            </div>
        </div>
        <div id="exp-tab" class="tab-content">
            <div class="stat" style="background:var(--navy); color:white; padding:15px;"><small>Profit</small><b id="netProfit">₹0</b></div>
            <div class="section">
                <input type="date" id="expDate"><input type="number" id="expAmt" placeholder="Amt"><input type="text" id="expNote" placeholder="Note">
                <button class="btn-main" style="background:var(--danger);" onclick="addExpense()">LOG EXPENSE</button>
            </div>
        </div>
    </div>
</div>

<script>
    let students = [], expenses = [];
    function switchTab(t) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById(t).classList.add('active'); }
    function saveStudent() {
        const name = document.getElementById('stuName').value, phone = document.getElementById('stuPhone').value, fee = document.getElementById('stuFeeDate').value, amount = document.getElementById('stuAmt').value, seat = document.getElementById('stuSeat').value;
        if(!name || !phone || !fee) return alert("Fill details");
        students.push({ id: Date.now(), name, phone, fee, amount, seat });
        saveToLocal(); render();
    }
    function render() {
        let sH = "", tF = 0;
        students.forEach(s => { tF += parseFloat(s.amount) || 0; sH += `<div class="record-item"><b>${s.name} (${s.seat})</b><br><small>Till: ${s.fee}</small></div>`; });
        document.getElementById('countTotal').innerText = students.length; document.getElementById('sumFees').innerText = '₹' + tF; document.getElementById('stuList').innerHTML = sH;
    }
    function saveToLocal() { localStorage.setItem('bapora_v10_7', JSON.stringify({students, expenses})); }
    function loadData() { let raw = localStorage.getItem('bapora_v10_7'); if(raw) { const p = JSON.parse(raw); students = p.students || []; expenses = p.expenses || []; render(); } }
    function exportData() { const blob = new Blob([JSON.stringify({students, expenses})], {type: 'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `bapora_backup.txt`; a.click(); }
</script>
</body>
                    </html>
