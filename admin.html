<!DOCTYPE html>
<html>
<head>
    <title>Bapora Command v10.14 (Cloud Secure)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --navy: #002347; --gold: #c5a059; --bg: #f4f4f9; --card: #ffffff; --text: #222; --safe: #1b5e20; --danger: #b71c1c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); padding: 0; margin: 0; }
        .container { max-width: 480px; margin: auto; background: var(--card); border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid var(--navy); overflow: hidden; padding: 8px; }
        .tabs { display: flex; background: #eceff1; }
        .tab-btn { flex: 1; padding: 14px 5px; border: none; background: none; font-weight: bold; cursor: pointer; color: #546e7a; font-size: 12px; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--navy); border-bottom: 3px solid var(--navy); background: #fff; }
        .tab-content { display: none; padding: 12px; }
        .tab-content.active { display: block; }
        .section { background: #fafafa; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #e0e0e0; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #cfd8dc; border-radius: 4px; box-sizing: border-box; }
        .record-item { background: white; padding: 12px; border-radius: 6px; margin-top: 8px; border: 1px solid #eceff1; position: relative; border-left: 4px solid var(--navy); }
        .due-alert { border-left-color: var(--danger) !important; background: #fff5f5; }
        .wa-btn-group { display: flex; gap: 4px; margin-top: 8px; }
        .wa-btn { flex: 1; color: white; padding: 8px 2px; border-radius: 4px; font-size: 10px; font-weight: bold; text-align: center; border: none; cursor: pointer; }
        .btn-rcpt { background: var(--safe); }
        .btn-due { background: #ff9800; }
        .btn-lunch { background: #007bff; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .stat { background: #fff; border: 1px solid var(--navy); padding: 8px; border-radius: 6px; text-align: center; color: var(--navy); }
        .stat b { font-size: 14px; display: block; }
        .btn-main { padding: 12px; width: 100%; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        .filter-bar { display: flex; gap: 4px; margin-bottom: 10px; }
        .btn-filter { flex: 1; font-size: 9px; padding: 8px 2px; border: 1px solid var(--navy); background: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-filter.active { background: var(--navy); color: white; }
        .action-link { font-size: 10px; font-weight: bold; cursor: pointer; margin-top: 8px; display: inline-block; margin-right: 15px; }
        #login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:var(--navy); }
        .login-box { background:white; padding:30px; border-radius:10px; text-align:center; width:280px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color:var(--navy); margin-top:0;">Bapora Command</h2>
        <p style="font-size:12px; color:#666; font-weight:bold;">SECURE CLOUD ACCESS</p>
        <input type="email" id="loginEmail" placeholder="Admin Email">
        <input type="password" id="loginPass" placeholder="Master Password">
        <button id="loginBtn" class="btn-main" style="background:var(--gold); color:black;" onclick="window.login()">UNLOCK SYSTEM</button>
        <p id="loginError" style="color:red; font-size:11px; display:none;"></p>
    </div>
</div>

<div id="app-screen" style="display:none; padding:8px;">
    <div class="container">
        <div class="tabs">
            <button id="tabL" class="tab-btn active" onclick="window.switchTab('lib-tab')">LIBRARIAN</button>
            <button id="tabE" class="tab-btn" onclick="window.switchTab('exp-tab')">FINANCE</button>
        </div>

        <div id="lib-tab" class="tab-content active">
            <div class="stat-grid">
                <div class="stat"><small>Students</small><b id="countTotal">0</b></div>
                <div class="stat" style="color:var(--danger);"><small>Due Now</small><b id="countDue">0</b></div>
                <div class="stat" style="color:var(--safe); border-color:var(--safe);"><small>Fees This Mnt</small><b id="sumFees">₹0</b></div>
                <div class="stat" style="color:var(--danger); border-color:var(--danger);"><small>Exp This Mnt</small><b id="sumExp">₹0</b></div>
            </div>

            <div class="section">
                <input type="hidden" id="editId">
                <input type="text" id="stuName" placeholder="Student Name">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="stuSeat" placeholder="Seat" style="flex:1;">
                    <input type="number" id="stuAmt" placeholder="Fee Paid (₹)" style="flex:1;">
                </div>
                <input type="tel" id="stuPhone" placeholder="WhatsApp No">
                <input type="date" id="stuFeeDate">
                <button id="saveBtn" class="btn-main" style="background:var(--navy);" onclick="window.saveStudent()">SAVE TO CLOUD</button>
                <button id="cancelBtn" class="btn-main" style="background:#666; display:none;" onclick="window.clearForms()">CANCEL</button>
            </div>

            <input type="text" id="stuSearch" placeholder="🔍 Search..." onkeyup="window.render()">
            
            <div class="filter-bar">
                <button id="fAll" class="btn-filter active" onclick="window.setF('all')">ALL</button>
                <button id="fDue" class="btn-filter" onclick="window.setF('due')">DUE</button>
                <button id="fFol" class="btn-filter" style="border-color:#ef6c00;" onclick="window.setF('fol')">⚠️ FOLLOW-UP</button>
            </div>

            <div id="stuList"></div>

            <div class="section" style="margin-top:20px; text-align:center; background:#eee;">
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <button class="btn-main" style="background:var(--gold); color:#000; flex:1;" onclick="window.exportData()">💾 DOWNLOAD</button>
                    <button class="btn-main" style="background:#28a745; color:#fff; flex:1;" onclick="window.exportToExcel()">📊 EXCEL</button>
                </div>
                <div style="border-top:1px solid #ccc; padding-top:10px;">
                    <input type="file" id="importFile" style="font-size:10px;" accept=".txt">
                    <button class="btn-main" style="background:var(--navy);" onclick="window.importData()">🔄 UPLOAD/RESTORE TO CLOUD</button>
                </div>
                <button class="btn-main" style="background:#b71c1c; margin-top:15px;" onclick="window.logout()">LOGOUT</button>
            </div>
        </div>

        <div id="exp-tab" class="tab-content">
            <div class="stat" style="background:var(--navy); color:white; margin-bottom:15px; padding:15px; border-radius:6px; text-align:center;">
                <small>Net Profit (This Month)</small><b id="netProfit" style="font-size:24px;">₹0</b>
            </div>
            
            <div class="section">
                <p style="margin:0 0 5px 0; font-weight:bold;">➕ Add / Edit Expense</p>
                <input type="hidden" id="editExpId">
                <input type="date" id="expDate">
                <input type="number" id="expAmt" placeholder="Amount (₹)">
                <input type="text" id="expNote" placeholder="Note (Electricity etc.)">
                <button id="saveExpBtn" class="btn-main" style="background:var(--danger);" onclick="window.addExpense()">LOG TO CLOUD</button>
                <button id="cancelExpBtn" class="btn-main" style="background:#666; display:none;" onclick="window.clearExpForm()">CANCEL EDIT</button>
            </div>
            <div id="historyList"></div>
            <hr><div id="expList"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAsF3o3S7fpvTumwVVL_exuqMlAUS5MKXE",
      authDomain: "baporalibrary-fea16.firebaseapp.com",
      databaseURL: "https://baporalibrary-fea16-default-rtdb.firebaseio.com",
      projectId: "baporalibrary-fea16"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const MASTER_UID = "SDMZEUimL9RVB7oGxxD6klxROA22";

    let students = [], expenses = [], history = [], curF = 'all';

    window.login = function() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        signInWithEmailAndPassword(auth, email, pass).catch(() => {
            alert("Wrong Email or Password!");
        });
    };

    window.logout = function() { signOut(auth); };

    onAuthStateChanged(auth, (user) => {
        if (user && user.uid === MASTER_UID) {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-screen').style.display = "block";
            setupCloudSync();
        } else {
            document.getElementById('login-screen').style.display = "flex";
            document.getElementById('app-screen').style.display = "none";
        }
    });

    function setupCloudSync() {
        onValue(ref(db, 'admin_data'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                students = data.students || [];
                expenses = data.expenses || [];
                history = data.history || [];
            }
            window.render();
        });
    }

    function saveToCloud() {
        set(ref(db, 'admin_data'), { students, expenses, history });
    }

    window.switchTab = function(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t).classList.add('active');
    };

    window.setF = function(f) {
        curF = f;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        document.getElementById('f'+f.charAt(0).toUpperCase()+f.slice(1)).classList.add('active');
        window.render();
    };

    window.saveStudent = function() {
        const id = document.getElementById('editId').value || Date.now();
        const name = document.getElementById('stuName').value;
        const phone = document.getElementById('stuPhone').value;
        const fee = document.getElementById('stuFeeDate').value;
        const amount = document.getElementById('stuAmt').value;
        const seat = document.getElementById('stuSeat').value;
        if(!name || !phone || !fee) return alert("Fill Name, Phone and Date");
        const idx = students.findIndex(s => s.id == id);
        const data = { id: parseInt(id), name, phone, fee, amount, seat, isCounted: true };
        if(idx > -1) students[idx] = data; else students.push(data);
        saveToCloud();
        window.clearForms();
    };

    window.render = function() {
        const q = document.getElementById('stuSearch').value.toLowerCase();
        let sH = "", dCnt = 0, tFees = 0;
        const now = new Date();
        students.forEach(s => {
            if(s.isCounted !== false) tFees += parseFloat(s.amount) || 0;
            const isDue = (s.fee && now >= new Date(s.fee));
            if(isDue) dCnt++;
            if(s.name.toLowerCase().includes(q) && (curF=='all' || (curF=='due' && isDue))) {
                sH += `<div class="record-item ${isDue ? 'due-alert' : ''}">
                    <b>${s.name}</b> <span style="float:right;">₹${s.amount}</span><br>
                    <small>Seat: ${s.seat} | Valid: ${s.fee}</small><br>
                    <div class="wa-btn-group">
                        <button onclick="window.wa(${s.id}, 1)" class="wa-btn btn-rcpt">Receipt</button>
                        <button onclick="window.wa(${s.id}, 2)" class="wa-btn btn-due">Due</button>
                        <button onclick="window.wa(${s.id}, 3)" class="wa-btn btn-lunch">Lunch</button>
                    </div>
                    <span class="action-link" style="color:blue" onclick="window.editStu(${s.id})">✎ EDIT</span>
                    <span class="action-link" style="color:red" onclick="window.delStu(${s.id})">✖ DELETE</span>
                </div>`;
            }
        });
        document.getElementById('countTotal').innerText = students.length;
        document.getElementById('countDue').innerText = dCnt;
        document.getElementById('sumFees').innerText = '₹' + tFees;
        document.getElementById('stuList').innerHTML = sH || "<center style='padding:20px'>No records found</center>";
    };

    window.wa = function(id, type) {
        const s = students.find(x => x.id == id);
        let parts = s.fee.split('-');
        let displayDate = `${parts[2]}/${parts[1]}/${parts[0]}`; 
        let msg = "";
        
        if(type == 1) msg = `Namaste ${s.name}, fee amount ₹${s.amount} received. Valid till ${displayDate}. Thank you! Happy Studying 📖 - Bapora Library`;
        if(type == 2) msg = `Namaste ${s.name}, fee pending since ${displayDate}. Please update soon.`;
        
        // Lunch message updated here
        if(type == 3) msg = `Namaste ${s.name}, your lunch has been arrived. Please collect it from reception. 🍱🥄`;
        
        window.open(`https://wa.me/91${s.phone}?text=${encodeURIComponent(msg)}`);
    };

    window.editStu = function(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('stuName').value = s.name;
        document.getElementById('stuPhone').value = s.phone;
        document.getElementById('stuFeeDate').value = s.fee;
        document.getElementById('stuAmt').value = s.amount;
        document.getElementById('stuSeat').value = s.seat;
        window.scrollTo(0,0);
    };

    window.delStu = function(id) { if(confirm("Delete student?")) { students = students.filter(s => s.id != id); saveToCloud(); } };
    window.clearForms = function() { document.querySelectorAll('#lib-tab input').forEach(i => i.value = ''); };
    window.addExpense = function() { /* add expense logic */ };
    window.exportData = function() { /* export logic */ };
    window.exportToExcel = function() { /* excel logic */ };
    window.importData = function() { /* import logic */ };
</script>
</body>
</html>
