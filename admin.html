<!DOCTYPE html>
<html>
<head>
    <title>Bapora Command v10.25 (Smart Megaphone)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --navy: #002347; --gold: #c5a059; --bg: #f4f4f9; --card: #ffffff; --text: #222; --safe: #1b5e20; --danger: #b71c1c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); padding: 0; margin: 0; }
        .container { max-width: 480px; margin: auto; background: var(--card); border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid var(--navy); overflow: hidden; padding: 8px; padding-bottom: 60px; }
        .tabs { display: flex; background: #eceff1; }
        .tab-btn { flex: 1; padding: 14px 5px; border: none; background: none; font-weight: bold; cursor: pointer; color: #546e7a; font-size: 12px; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--navy); border-bottom: 3px solid var(--navy); background: #fff; }
        .tab-content { display: none; padding: 12px; }
        .tab-content.active { display: block; }
        .section { background: #fafafa; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #e0e0e0; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #cfd8dc; border-radius: 4px; box-sizing: border-box; }
        .record-item { background: white; padding: 12px; border-radius: 6px; margin-top: 8px; border: 1px solid #eceff1; position: relative; border-left: 4px solid var(--navy); }
        .due-alert { border-left-color: var(--danger) !important; background: #fff5f5; }
        
        .follow-up { background: #fff3e0; color: #ef6c00; font-weight: bold; padding: 4px; border-radius: 4px; font-size: 10px; display: inline-block; margin-top: 5px; border: 1px solid #ffe0b2; }
        .remind-date { font-size: 9px; color: #666; display: block; margin-top: 2px; }
        
        .wa-btn-group { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; justify-content: space-between;}
        .wa-btn { flex: 1; min-width: 30%; color: white; padding: 8px 2px; border-radius: 4px; font-size: 10px; font-weight: bold; text-align: center; border: none; cursor: pointer; margin-bottom: 2px; }
        .btn-rcpt { background: var(--safe); }
        .btn-due { background: #ff9800; }
        .btn-lunch { background: #007bff; }
        .btn-alert { background: #8e44ad; }
        .btn-exp { background: var(--danger); } 
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .stat { background: #fff; border: 1px solid var(--navy); padding: 8px; border-radius: 6px; text-align: center; color: var(--navy); }
        .stat b { font-size: 14px; display: block; }
        .btn-main { padding: 12px; width: 100%; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        
        .filter-bar { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
        .btn-filter { flex: 1; min-width: 20%; font-size: 9px; padding: 8px 2px; border: 1px solid var(--navy); background: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-filter.active { background: var(--navy); color: white; }
        
        .action-link { font-size: 10px; font-weight: bold; cursor: pointer; margin-top: 8px; display: inline-block; margin-right: 15px; }
        .history-card { background: #e3f2fd; padding: 10px; border-radius: 6px; margin-top: 8px; font-size: 11px; border-left: 4px solid var(--gold); }
        
        #mega-panel { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--navy); color: white; padding: 15px; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); z-index: 9999; text-align: center; border-top: 3px solid var(--gold); }
        .btn-mega { background: var(--gold); color: black; font-weight: bold; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 5px; font-size: 16px; width: 100%; }
        
        #login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:var(--navy); }
        .login-box { background:white; padding:30px; border-radius:10px; text-align:center; width:280px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color:var(--navy); margin-top:0;">Bapora Command</h2>
        <p style="font-size:12px; color:#666; font-weight:bold;">SECURE CLOUD ACCESS</p>
        <input type="email" id="loginEmail" placeholder="Admin Email">
        <input type="password" id="loginPass" placeholder="Master Password">
        <button id="loginBtn" class="btn-main" style="background:var(--gold); color:black;" onclick="window.login()">UNLOCK SYSTEM</button>
        <p id="loginError" style="color:red; font-size:12px; margin-top:10px; font-weight:bold;"></p>
    </div>
</div>

<div id="app-screen" style="display:none; padding:8px;">
    <div class="container">
        <div class="tabs">
            <button id="tabLBtn" class="tab-btn active" onclick="window.switchTab('lib-tab')">LIBRARIAN</button>
            <button id="tabEBtn" class="tab-btn" onclick="window.switchTab('exp-tab')">FINANCE</button>
        </div>

        <div id="lib-tab" class="tab-content active">
            <div class="stat-grid">
                <div class="stat"><small>Students</small><b id="countTotal">0</b></div>
                <div class="stat" style="color:var(--danger);"><small>Due Now</small><b id="countDue">0</b></div>
                <div class="stat" style="color:var(--safe); border-color:var(--safe);"><small>Fees This Mnt</small><b id="sumFees">₹0</b></div>
                <div class="stat" style="color:var(--danger); border-color:var(--danger);"><small>Exp This Mnt</small><b id="sumExp">₹0</b></div>
            </div>

            <div class="section">
                <input type="hidden" id="editId">
                <input type="text" id="stuName" placeholder="Student Name">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="stuSeat" placeholder="Seat" style="flex:1;">
                    <input type="number" id="stuAmt" placeholder="Fee Paid (₹)" style="flex:1;">
                </div>
                <input type="tel" id="stuPhone" placeholder="WhatsApp No">
                <input type="date" id="stuFeeDate">
                <button id="saveBtn" class="btn-main" style="background:var(--navy);" onclick="window.saveStudent()">SAVE TO CLOUD</button>
                <button id="cancelBtn" class="btn-main" style="background:#666; display:none;" onclick="window.clearForms()">CANCEL</button>
            </div>

            <input type="text" id="stuSearch" placeholder="🔍 Search by Name, Seat, or Mobile..." onkeyup="window.render()">
            
            <div class="filter-bar">
                <button id="fAll" class="btn-filter active" onclick="window.setF('all')">ALL</button>
                <button id="fDue" class="btn-filter" onclick="window.setF('due')">DUE</button>
                <button id="fFol" class="btn-filter" style="border-color:#ef6c00;" onclick="window.setF('fol')">⚠️ FOLLOW UP</button>
                <button id="fExp" class="btn-filter" style="border-color:#b71c1c; color:#b71c1c;" onclick="window.setF('exp')">🚨 EXPIRED</button>
            </div>

            <button class="btn-main" style="background: linear-gradient(145deg, #f39c12, #d35400); margin-bottom: 15px; font-size:14px;" onclick="window.startMegaphone()">📢 BROADCAST MESSAGE</button>

            <div id="stuList"></div>

            <div class="section" style="margin-top:20px; text-align:center; background:#eee;">
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <button class="btn-main" style="background:var(--gold); color:#000; flex:1;" onclick="window.exportData()">💾 DOWNLOAD</button>
                    <button class="btn-main" style="background:#28a745; color:#fff; flex:1;" onclick="window.exportToExcel()">📊 EXCEL</button>
                </div>
                <div style="border-top:1px solid #ccc; padding-top:10px;">
                    <input type="file" id="importFile" style="font-size:10px;" accept=".txt">
                    <button class="btn-main" style="background:var(--navy);" onclick="window.importData()">🔄 UPLOAD/RESTORE TO CLOUD</button>
                </div>
                <button class="btn-main" style="background:#b71c1c; margin-top:15px;" onclick="window.logout()">LOGOUT</button>
            </div>
        </div>

        <div id="exp-tab" class="tab-content">
            <div class="stat" style="background:var(--navy); color:white; margin-bottom:15px; padding:15px; border-radius:6px; text-align:center;">
                <small>Net Profit (This Month)</small><b id="netProfit" style="font-size:24px;">₹0</b>
            </div>
            <div class="section">
                <input type="hidden" id="editExpId">
                <input type="date" id="expDate">
                <input type="number" id="expAmt" placeholder="Amount (₹)">
                <input type="text" id="expNote" placeholder="Note (Electricity etc.)">
                <button id="saveExpBtn" class="btn-main" style="background:var(--danger);" onclick="window.addExpense()">LOG EXPENSE</button>
                <button id="cancelExpBtn" class="btn-main" style="background:#666; display:none;" onclick="window.clearExpForm()">CANCEL EDIT</button>
            </div>
            <div id="historyList"></div>
            <hr><div id="expList"></div>
        </div>
    </div>
</div>

<div id="mega-panel">
    <div style="font-size: 14px; margin-bottom: 5px;">📢 <b>MEGAPHONE ACTIVE</b></div>
    <div style="font-size: 12px; margin-bottom: 10px; color: var(--gold);">Students Left in Queue: <b id="megaCount">0</b></div>
    <div style="font-size: 11px; margin-bottom: 10px;">Next: <span id="megaNextName" style="font-weight:bold; color:#fff;"></span></div>
    <div style="display: flex; gap: 10px;">
        <button class="btn-main" style="background: #e74c3c; width: 40%; margin-top: 0;" onclick="window.stopMegaphone()">STOP 🛑</button>
        <button class="btn-mega" style="width: 60%; margin-top: 0;" onclick="window.fireMegaphone()">FIRE NEXT 🚀</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAsF3o3S7fpvTumwVVL_exuqMlAUS5MKXE",
      authDomain: "baporalibrary-fea16.firebaseapp.com",
      databaseURL: "https://baporalibrary-fea16-default-rtdb.firebaseio.com",
      projectId: "baporalibrary-fea16"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let students = [], expenses = [], history = [], curF = 'all';
    let megaQueue = [], megaMessage = "";

    window.login = function() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        document.getElementById('loginBtn').innerText = "Verifying...";
        document.getElementById('loginError').innerText = "";
        
        signInWithEmailAndPassword(auth, email, pass).catch((error) => {
            document.getElementById('loginBtn').innerText = "UNLOCK SYSTEM";
            document.getElementById('loginError').innerText = "❌ Wrong Email or Password!";
        });
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-screen').style.display = "block";
            setupCloudSync();
        } else {
            document.getElementById('login-screen').style.display = "flex";
            document.getElementById('app-screen').style.display = "none";
            document.getElementById('loginBtn').innerText = "UNLOCK SYSTEM";
        }
    });

    function setupCloudSync() {
        onValue(ref(db, 'admin_data'), (snap) => {
            const data = snap.val();
            if (data) { students = data.students || []; expenses = data.expenses || []; history = data.history || []; }
            window.render();
        });
    }

    function saveToCloud() { set(ref(db, 'admin_data'), { students, expenses, history }); }

    window.switchTab = (t) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.getElementById(t + 'Btn').classList.add('active');
    };

    window.setF = (f) => {
        curF = f;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        if(f=='all') document.getElementById('fAll').classList.add('active');
        if(f=='due') document.getElementById('fDue').classList.add('active');
        if(f=='fol') document.getElementById('fFol').classList.add('active');
        if(f=='exp') document.getElementById('fExp').classList.add('active');
        window.render();
    };

    window.startMegaphone = function() {
        const q = document.getElementById('stuSearch').value.toLowerCase();
        const now = new Date();
        megaQueue = [];

        students.forEach(s => {
            const isDue = (s.fee && now >= new Date(s.fee));
            let isFol = false, isExp = false;
            
            const daysOverdue = isDue ? Math.floor((now - new Date(s.fee)) / (1000 * 60 * 60 * 24)) : 0;
            if(daysOverdue >= 5) isExp = true; 
            
            if(s.lastRemind) {
                const diff = Math.floor((now - new Date(s.lastRemind)) / (1000 * 60 * 60 * 24));
                isFol = isDue && diff >= 3;
            }
            
            let matchName = s.name.toLowerCase().includes(q);
            let matchPhone = s.phone && s.phone.includes(q);
            let matchSeat = s.seat && s.seat.toString().toLowerCase().includes(q);

            if((matchName || matchPhone || matchSeat) && (curF=='all' || (curF=='due' && isDue) || (curF=='fol' && isFol) || (curF=='exp' && isExp))) {
                if(s.phone) megaQueue.push(s);
            }
        });

        if(megaQueue.length === 0) return alert("No valid students found in current filter!");

        // NAYA: Smart Pre-filled Message Logic based on Filter Tab
        let defaultTemplate = "";
        if (curF === 'exp') {
            defaultTemplate = "your library membership expired on [DATE]. We haven't heard from you! Please confirm if you are taking a break or planning to continue, so we can manage your seat reservation accordingly. Thank you! 📚 - Admin, Bapora Library";
        } else if (curF === 'due' || curF === 'fol') {
            defaultTemplate = "your fee is pending since [DATE]. Please update soon.";
        } else {
            defaultTemplate = "Please type your general announcement here...";
        }

        let inputMsg = prompt(`Broadcast to ${megaQueue.length} students.\n\nKeep [DATE] in the text, and the system will automatically change it to their exact expiry date!`, defaultTemplate);
        
        if(inputMsg && inputMsg.trim() !== "") {
            megaMessage = inputMsg; updateMegaUI(); document.getElementById('mega-panel').style.display = 'block';
        }
    };

    function updateMegaUI() {
        document.getElementById('megaCount').innerText = megaQueue.length;
        if(megaQueue.length > 0) { document.getElementById('megaNextName').innerText = megaQueue[0].name + " (Seat " + megaQueue[0].seat + ")"; } 
        else { document.getElementById('mega-panel').style.display = 'none'; alert("📢 Megaphone Broadcast Complete!"); }
    }

    window.fireMegaphone = function() {
        if(megaQueue.length > 0) {
            let s = megaQueue.shift(); 
            
            // Generate exact date for this student
            let displayDate = "N/A";
            if(s.fee) {
                let parts = s.fee.split('-');
                displayDate = `${parts[2]}/${parts[1]}/${parts[0]}`; 
            }
            
            // NAYA: Replace [DATE] with the student's actual expiry date
            let customizedBody = megaMessage.replace(/\[DATE\]/g, displayDate);
            let finalMsg = `Namaste ${s.name},\n\n${customizedBody}`;
            
            window.open(`https://wa.me/91${s.phone}?text=${encodeURIComponent(finalMsg)}`, '_blank');
            const idx = students.findIndex(x => x.id == s.id);
            if(idx > -1) { students[idx].lastRemind = new Date().toISOString(); saveToCloud(); }
            updateMegaUI();
        }
    };

    window.stopMegaphone = function() { megaQueue = []; document.getElementById('mega-panel').style.display = 'none'; };

    window.saveStudent = () => {
        const id = document.getElementById('editId').value || Date.now();
        const name = document.getElementById('stuName').value;
        const phone = document.getElementById('stuPhone').value;
        const fee = document.getElementById('stuFeeDate').value;
        const amount = document.getElementById('stuAmt').value;
        const seat = document.getElementById('stuSeat').value;
        
        if(!name || !phone || !fee) return alert("Fill Name, Phone and Date");
        const idx = students.findIndex(s => s.id == id);
        const data = { id: parseInt(id), name, phone, fee, amount, seat, lastRemind: students[idx]?.lastRemind || null, isCounted: true };
        
        if(idx > -1) students[idx] = data; else students.push(data);
        saveToCloud(); 

        if(amount && confirm(`Record Saved! ✅\nDo you want to send a WhatsApp receipt to ${name} for ₹${amount}?`)) {
            window.wa(data.id, 1);
        } 
        else if (amount && confirm(`Do you want to alert the Management Team about this payment?`)) {
            window.wa(data.id, 4);
        }
        
        window.clearForms();
    };

    window.render = () => {
        const q = document.getElementById('stuSearch').value.toLowerCase();
        let sH = "", dCnt = 0, tFees = 0;
        const now = new Date();
        
        students.forEach(s => {
            if(s.isCounted !== false) tFees += parseFloat(s.amount) || 0;
            const isDue = (s.fee && now >= new Date(s.fee));
            if(isDue) dCnt++;

            let isFol = false, isExp = false, folHTML = "", rDateHTML = "";
            const daysOverdue = isDue ? Math.floor((now - new Date(s.fee)) / (1000 * 60 * 60 * 24)) : 0;
            
            if(daysOverdue >= 5) {
                isExp = true;
                folHTML = `<div class="follow-up" style="background:#ffebee; color:#b71c1c; border-color:#ffcdd2;">🚨 Membership Expired (${daysOverdue} days ago)</div>`;
            }

            if(s.lastRemind) {
                const diff = Math.floor((now - new Date(s.lastRemind)) / (1000 * 60 * 60 * 24));
                if(isDue && diff >= 3 && !isExp) { 
                    isFol = true;
                    folHTML = `<div class="follow-up">⚠️ Follow-up Needed (${diff}d ago)</div>`;
                }
                rDateHTML = `<span class="remind-date">Last Sent: ${new Date(s.lastRemind).toLocaleDateString()}</span>`;
            }

            let matchName = s.name.toLowerCase().includes(q);
            let matchPhone = s.phone && s.phone.includes(q);
            let matchSeat = s.seat && s.seat.toString().toLowerCase().includes(q);

            if((matchName || matchPhone || matchSeat) && (curF=='all' || (curF=='due' && isDue) || (curF=='fol' && isFol) || (curF=='exp' && isExp))) {
                sH += `<div class="record-item ${isDue ? 'due-alert' : ''}">
                    <b>${s.name}</b> <span style="float:right; color:var(--safe);">₹${s.amount}</span><br>
                    <small>Seat: ${s.seat} | Valid: ${s.fee}</small><br>
                    ${rDateHTML} ${folHTML}
                    <div class="wa-btn-group">
                        <button onclick="window.wa(${s.id}, 1)" class="wa-btn btn-rcpt">Receipt</button>
                        <button onclick="window.wa(${s.id}, 2)" class="wa-btn btn-due">Due</button>
                        <button onclick="window.wa(${s.id}, 3)" class="wa-btn btn-lunch">Lunch</button>
                        <button onclick="window.wa(${s.id}, 4)" class="wa-btn btn-alert">Mgmt Alert</button>
                        <button onclick="window.wa(${s.id}, 5)" class="wa-btn btn-exp">Final Call</button>
                    </div>
                    <span class="action-link" style="color:blue" onclick="window.editStu(${s.id})">✎ EDIT</span>
                    <span class="action-link" style="color:red" onclick="window.delStu(${s.id})">✖ DELETE</span>
                </div>`;
            }
        });

        const tE = expenses.reduce((a, b) => a + (parseFloat(b.amt) || 0), 0);
        document.getElementById('countTotal').innerText = students.length;
        document.getElementById('countDue').innerText = dCnt;
        document.getElementById('sumFees').innerText = '₹' + tFees;
        document.getElementById('sumExp').innerText = '₹' + tE;
        document.getElementById('netProfit').innerText = '₹' + (tFees - tE);
        document.getElementById('stuList').innerHTML = sH || "<center style='padding:20px'>No records found</center>";
        
        let eH = "";
        let sortedExp = [...expenses].sort((a,b) => new Date(b.date) - new Date(a.date));
        sortedExp.forEach(e => {
            eH += `<div class="record-item" style="border-left-color:red">
                <b>${e.note}</b> <span style="float:right;">₹${e.amt}</span><br>
                <small>${new Date(e.date).toLocaleDateString('en-GB')}</small><br>
                <span class="action-link" style="color:blue" onclick="window.editExp(${e.id})">✎ EDIT</span>
                <span class="action-link" style="color:red" onclick="window.delExp(${e.id})">✖ DELETE</span>
            </div>`;
        });
        document.getElementById('expList').innerHTML = eH || "<small><br>No expenses logged.</small>";

        let hH = "<b>📜 MONTHLY REPORTS</b>";
        [...history].reverse().forEach(h => { 
            hH += `<div class="history-card"><b>${h.month}</b><br>Fees: ₹${h.fee} | Exp: ₹${h.exp} | Profit: ₹${h.profit}</div>`; 
        });
        document.getElementById('historyList').innerHTML = hH;
    };

    window.wa = (id, type) => {
        const idx = students.findIndex(x => x.id == id);
        const s = students[idx];
        let parts = s.fee.split('-');
        let displayDate = `${parts[2]}/${parts[1]}/${parts[0]}`; 
        let msg = "";
        
        if(type == 1) {
            msg = `Namaste ${s.name}, fee amount ₹${s.amount} received. Valid till ${displayDate}. Thank you! Happy Studying 📖 - Bapora Library`;
            students[idx].lastRemind = new Date().toISOString();
            saveToCloud(); window.open(`https://wa.me/91${s.phone}?text=${encodeURIComponent(msg)}`);
        }
        else if(type == 2) {
            msg = `Namaste ${s.name}, your fee is pending since ${displayDate}. Please update soon.`;
            students[idx].lastRemind = new Date().toISOString();
            saveToCloud(); window.open(`https://wa.me/91${s.phone}?text=${encodeURIComponent(msg)}`);
        }
        else if(type == 3) {
            msg = `Namaste ${s.name}, your lunch has been arrived. Please collect it from reception. 🍱🥄`;
            students[idx].lastRemind = new Date().toISOString();
            saveToCloud(); window.open(`https://wa.me/91${s.phone}?text=${encodeURIComponent(msg)}`);
        }
        else if(type == 4) {
            msg = `📢 *Seat Payment Alert*\n\nStudent: *${s.name}*\nSeat No: *${s.seat}* (Reserved)\nAmount Paid: *₹${s.amount}*\nValid Till: *${displayDate}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }
        else if(type == 5) {
            msg = `Namaste ${s.name}, your library membership expired on ${displayDate}. We haven't heard from you! Please confirm if you are taking a break or planning to continue, so we can manage your seat reservation accordingly. Thank you! 📚 - Admin, Bapora Library`;
            students[idx].lastRemind = new Date().toISOString();
            saveToCloud(); window.open(`https://wa.me/91${s.phone}?text=${encodeURIComponent(msg)}`);
        }
    };

    window.addExpense = () => {
        const id = document.getElementById('editExpId').value || Date.now();
        const amt = document.getElementById('expAmt').value;
        const note = document.getElementById('expNote').value;
        const date = document.getElementById('expDate').value;
        if(!amt || !date) return alert("Enter Amt/Date");
        const idx = expenses.findIndex(e => e.id == id);
        const data = { id: parseInt(id), amt: parseFloat(amt), note, date };
        if(idx > -1) expenses[idx] = data; else expenses.push(data);
        saveToCloud(); window.clearExpForm();
    };

    window.editExp = (id) => {
        const e = expenses.find(x => x.id == id);
        document.getElementById('editExpId').value = e.id;
        document.getElementById('expAmt').value = e.amt;
        document.getElementById('expNote').value = e.note;
        document.getElementById('expDate').value = e.date;
        document.getElementById('saveExpBtn').innerText = "UPDATE CLOUD EXPENSE";
        document.getElementById('cancelExpBtn').style.display = "block";
        window.scrollTo(0,0);
    };

    window.delExp = (id) => { if(confirm("Delete expense?")) { expenses = expenses.filter(e => e.id != id); saveToCloud(); } };
    window.delStu = (id) => { if(confirm("Delete student?")) { students = students.filter(s => s.id != id); saveToCloud(); } };
    
    window.editStu = (id) => {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('stuName').value = s.name;
        document.getElementById('stuPhone').value = s.phone;
        document.getElementById('stuFeeDate').value = s.fee;
        document.getElementById('stuAmt').value = s.amount;
        document.getElementById('stuSeat').value = s.seat;
        document.getElementById('saveBtn').innerText = "UPDATE CLOUD RECORD";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    };

    window.clearForms = () => { document.querySelectorAll('#lib-tab input').forEach(i => i.value = ''); document.getElementById('saveBtn').innerText = "SAVE TO CLOUD"; document.getElementById('cancelBtn').style.display = "none"; };
    window.clearExpForm = () => { document.querySelectorAll('#exp-tab input').forEach(i => i.value = ''); document.getElementById('saveExpBtn').innerText = "LOG EXPENSE"; document.getElementById('cancelExpBtn').style.display = "none"; };
    
    window.importData = () => {
        const f = document.getElementById('importFile').files[0];
        if(!f) { alert("Pehle file select karein!"); return; }
        const r = new FileReader();
        r.onload = (e) => {
            try {
                const d = JSON.parse(e.target.result);
                if(d.Students_Snapshot) { students = d.Students_Snapshot; expenses = d.Detailed_Expenses || []; } 
                else if (d.students) { students = d.students; expenses = d.expenses || []; history = d.history || []; } 
                else { alert("Galat file format!"); return; }
                saveToCloud(); alert("System Successfully Restored from Backup! ✅");
            } catch(err) { alert("Format Error!"); }
        };
        r.readAsText(f);
    };

    window.exportData = () => {
        const blob = new Blob([JSON.stringify({students, expenses, history})], {type: 'text/plain'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = "bapora_master_backup.txt"; a.click();
    };

    window.exportToExcel = () => {
        let csv = "Name,Seat,Phone,Fee,Amount\n";
        students.forEach(s => { csv += `${s.name},${s.seat},${s.phone},${s.fee},${s.amount}\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = "Library_Report.csv"; a.click();
    };
</script>
</body>
</html>
